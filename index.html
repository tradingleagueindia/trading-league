<!DOCTYPE html>
<html>
<head>
  <title>Trading League India</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 450px;
      margin: 20px auto;
      padding: 10px;
    }

    .contest-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entry-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      background: #eee;
      height: 6px;
      border-radius: 10px;
      margin: 8px 0;
    }

    .progress {
      width: 65%;
      background: #28a745;
      height: 6px;
      border-radius: 10px;
    }

    .small-text {
      font-size: 13px;
      color: #555;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="contest-card">

    <div class="row">
      <div>
        <div class="small-text">Guaranteed</div>
        <h2 style="margin:5px 0;">₹4,95,000</h2>
      </div>
      <button class="entry-btn">₹99</button>
    </div>

    <div style="color:red; font-size:14px;">1,726 Spots Left</div>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>

    <div class="row small-text">
      <div>🥇 ₹1,25,000</div>
      <div>👥 5000 Spots</div>
    </div>

  </div>

</div>

</body>
</html>
