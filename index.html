<!DOCTYPE html>
<html>
<head>
  <title>Trading League India</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f2f2f2;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 40px auto;
      width: 80%;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    .btn {
      background: green;
      color: white;
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>₹99 Weekly Trading Challenge</h1>
    <p>Pool fills → Challenge Starts</p>
    <p>Win up to ₹1,25,000</p>
    <button class="btn">Join Now</button>
  </div>

</body>
</html>
